<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3导航 - UI预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F8FAFB;
            min-height: 100vh;
        }

        /* 顶栏 */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
        }
        .topbar h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1E293B;
        }
        .topbar .search {
            margin-left: 40px;
            padding: 10px 20px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            width: 300px;
            background: #fff;
            color: #64748B;
        }

        /* 布局 */
        .container {
            display: flex;
            padding-top: 70px;
            min-height: 100vh;
        }

        /* 左侧菜单 - mighty-pig-13 风格 */
        .sidebar {
            width: 260px;
            padding: 30px 20px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            min-height: calc(100vh - 70px);
            border-right: 1px solid #E2E8F0;
        }
        .menu-item {
            padding: 14px 20px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            color: #64748B;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .menu-item:hover {
            background: #fff;
            color: #1E293B;
            transform: perspective(500px) rotateX(-2deg) translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
        }
        .menu-item.active {
            background: #fff;
            color: #2563EB;
            border-left: 3px solid #2563EB;
            box-shadow: 0 4px 20px -5px rgba(37,99,235,0.2);
        }
        .menu-item i {
            margin-right: 12px;
        }
        .submenu {
            padding-left: 44px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        .submenu.show {
            max-height: 200px;
            padding-top: 8px;
        }
        .submenu-item {
            padding: 10px 16px;
            margin: 4px 0;
            border-radius: 8px;
            font-size: 13px;
            color: #94A3B8;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submenu-item:hover {
            background: linear-gradient(135deg, #2563EB10, #10B98110);
            color: #2563EB;
            transform: translateX(5px);
        }

        /* 右侧内容 */
        .content {
            flex: 1;
            padding: 40px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #E2E8F0;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* 卡片 - happy-monkey-54 + massive-earwig-94 风格 */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #E2E8F0;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.6s ease-out backwards;
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(37,99,235,0.1), transparent);
            transition: left 0.6s ease;
        }
        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: perspective(1000px) rotateX(-5deg) rotateY(5deg) translateY(-10px);
            box-shadow: 
                0 25px 50px -12px rgba(37, 99, 235, 0.15),
                0 0 0 1px rgba(37, 99, 235, 0.1);
            border-color: transparent;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563EB15, #10B98115);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
            transition: transform 0.3s ease;
        }
        .card:hover .card-icon {
            transform: rotate(10deg) scale(1.1);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 13px;
            color: #64748B;
            line-height: 1.5;
        }

        /* 涟漪效果 */
        .card {
            position: relative;
            overflow: hidden;
        }
        .card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(37, 99, 235, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        .card:active::after {
            width: 300px;
            height: 300px;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .card-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 900px) {
            .card-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .topbar { padding: 0 20px; }
            .topbar .search { width: 150px; }
            .content { padding: 20px; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 顶栏 -->
    <div class="topbar">
        <h1>M3 - 导航系统</h1>
        <input type="text" class="search" placeholder="🔍 搜索网站...">
    </div>

    <div class="container">
        <!-- 左侧菜单 -->
        <div class="sidebar">
            <div class="menu-item active" onclick="toggleSubmenu(this)">
                <i>📦</i> 报关工具
            </div>
            <div class="submenu show">
                <div class="submenu-item">海关码头</div>
                <div class="submenu-item">船代船司</div>
                <div class="submenu-item">三方平台</div>
            </div>

            <div class="menu-item" onclick="toggleSubmenu(this)">
                <i>🏛️</i> 政府网站
            </div>
            <div class="submenu">
                <div class="submenu-item">中国海关</div>
                <div class="submenu-item">单一窗口</div>
                <div class="submenu-item">商务局</div>
            </div>
        </div>

        <!-- 右侧内容 -->
        <div class="content">
            <h2 class="section-title">海关码头</h2>
            <div class="card-grid">
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">🏗️</div>
                    <div class="card-title">NCT 南沙一期</div>
                    <div class="card-desc">广州港南沙一期码头</div>
                </div>
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">🚢</div>
                    <div class="card-title">GOCT 赤湾二期</div>
                    <div class="card-desc">招商局港口赤湾码头</div>
                </div>
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">🌊</div>
                    <div class="card-title">NICT 南沙三期</div>
                    <div class="card-desc">广州港南沙三期码头</div>
                </div>
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">📋</div>
                    <div class="card-title">三期运抵报告</div>
                    <div class="card-desc">GZNICT 运抵报告查询</div>
                </div>
            </div>

            <h2 class="section-title" style="margin-top: 50px;">船代船司</h2>
            <div class="card-grid">
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">⚓</div>
                    <div class="card-title">航商国际</div>
                    <div class="card-desc">航运代理服务</div>
                </div>
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">🔗</div>
                    <div class="card-title">中联船代</div>
                    <div class="card-desc">船舶代理服务</div>
                </div>
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">🏦</div>
                    <div class="card-title">民生船代</div>
                    <div class="card-desc">民生银行船代</div>
                </div>
                <div class="card" onclick="window.open('#')">
                    <div class="card-icon">🌐</div>
                    <div class="card-title">中国外代</div>
                    <div class="card-desc">中国外轮代理</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSubmenu(el) {
            const submenu = el.nextElementSibling;
            const wasOpen = submenu.classList.contains('show');
            
            // 关闭所有子菜单
            document.querySelectorAll('.submenu').forEach(s => s.classList.remove('show'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            
            // 打开当前子菜单
            if (!wasOpen) {
                submenu.classList.add('show');
                el.classList.add('active');
            }
        }
    </script>
</body>
</html>
