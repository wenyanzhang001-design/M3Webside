<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3 - Loading</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        .loading-wrapper {
            display: flex; flex-direction: column; align-items: center;
        }

        /* ===== 3D格子动画（完全独立，不影响按钮）===== */
        .wrapper-grid {
            --animation-duration: 3s;
            --cube-color: #ffffff15;
            --highlight-color: #00cc44;
            --cube-width: 88px;
            --cube-height: 88px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(9, var(--cube-width));
            width: calc(9 * var(--cube-width));
            height: var(--cube-height);
            perspective: 700px;
            margin-bottom: 30px;
        }
        .cube {
            position: relative;
            transform-style: preserve-3d;
        }
        .face {
            position: absolute;
            display: flex; align-items: center; justify-content: center;
            width: var(--cube-width);
            height: var(--cube-height);
            background-color: var(--cube-color);
        }
        .face-left, .face-right, .face-back, .face-front {
            box-shadow: inset 0 0 2px 1px #0001, inset 0 0 12px 1px #fff1;
        }
        .face-front   { transform: rotateY(0deg)   translateZ(calc(var(--cube-width) / 2)); }
        .face-back    { transform: rotateY(180deg) translateZ(calc(var(--cube-width) / 2)); opacity: 0.6; }
        .face-left    { transform: rotateY(-90deg) translateZ(calc(var(--cube-width) / 2)); opacity: 0.6; }
        .face-right   { transform: rotateY(90deg)  translateZ(calc(var(--cube-width) / 2)); opacity: 0.6; }
        .face-top     { height: var(--cube-width); transform: rotateX(90deg)  translateZ(calc(var(--cube-width) / 2)); opacity: 0.8; }
        .face-bottom  { height: var(--cube-width); transform: rotateX(-90deg) translateZ(calc(var(--cube-height) - var(--cube-width) * 0.5)); opacity: 0.8; }

        .cube:nth-child(1) { z-index:0; animation-delay: 0s; }
        .cube:nth-child(2) { z-index:1; animation-delay: 0.3s; }
        .cube:nth-child(3) { z-index:2; animation-delay: 0.6s; }
        .cube:nth-child(4) { z-index:3; animation-delay: 0.9s; }
        .cube:nth-child(5) { z-index:4; animation-delay: 1.2s; }
        .cube:nth-child(6) { z-index:3; animation-delay: 1.5s; }
        .cube:nth-child(7) { z-index:2; animation-delay: 1.8s; }
        .cube:nth-child(8) { z-index:1; animation-delay: 2.1s; }
        .cube:nth-child(9) { z-index:0; animation-delay: 2.4s; }

        .cube { animation: translate-z var(--animation-duration) ease-in-out infinite; }
        .cube .face {
            animation: face-color var(--animation-duration) ease-in-out infinite, edge-glow var(--animation-duration) ease-in-out infinite;
            animation-delay: inherit;
        }
        .cube .face.face-front {
            animation: face-color var(--animation-duration) ease-in-out infinite, face-glow var(--animation-duration) ease-in-out infinite, edge-glow var(--animation-duration) ease-in-out infinite;
            animation-delay: inherit;
        }

        @keyframes translate-z {
            0%, 40%, 100% { transform: translateZ(-2px); }
            30%            { transform: translateZ(30px) translateY(-2px); }
        }
        @keyframes face-color {
            0%, 50%, 100% { background-color: var(--cube-color); }
            10%           { background-color: var(--highlight-color); }
        }
        @keyframes face-glow {
            0%, 50%, 100% { color: #fff0; filter: none; }
            30%           { color: #fff; filter: drop-shadow(0 28px 20px var(--highlight-color)); }
        }
        @keyframes edge-glow {
            0%, 40%, 100% { box-shadow: inset 0 0 2px 1px #0001, inset 0 0 12px 1px #fff1; }
            30%           { box-shadow: 0 0 4px 0px var(--highlight-color); }
        }

        .loading-text {
            font-family: "Poppins", sans-serif;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 22px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255,255,255,0.6);
            margin-left: 11px;
        }
        .loading-bar {
            width: calc(9 * var(--cube-width));
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin-top: 40px;
            overflow: hidden;
        }
        .loading-bar::after {
            content: '';
            display: block;
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00cc44, transparent);
            border-radius: 2px;
            animation: loading-sweep 1.5s ease-in-out infinite;
        }
        @keyframes loading-sweep {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* ===== 进入创华按钮：完全使用蓝色按钮.txt 源码 ===== */
        .btn-wrapper {
            margin-top: 40px;
            width: calc(9 * var(--cube-width));
            display: flex;
            justify-content: center;
        }
        .enter-btn {
            /* 完全来自蓝色按钮.txt 的源码 */
            font-size: 18px;
            padding: 1em 3.3em;
            cursor: pointer;
            transform: perspective(200px) rotateX(15deg);
            color: white;
            font-weight: 900;
            border: none;
            border-radius: 5px;
            background: linear-gradient(
                0deg,
                rgba(63, 94, 251, 1) 0%,
                rgba(70, 135, 252, 1) 100%
            );
            box-shadow: rgba(63, 94, 251, 0.2) 0px 40px 29px 0px;
            will-change: transform;
            transition: all 0.3s;
            border-bottom: 2px solid rgba(70, 135, 252, 1);
            text-decoration: none;
            display: inline-block;
        }
        .enter-btn:hover {
            transform: perspective(180px) rotateX(30deg) translateY(2px);
        }
        .enter-btn:active {
            transform: perspective(170px) rotateX(36deg) translateY(5px);
        }
    </style>
</head>
<body>
    <div class="loading-wrapper">
        <div class="wrapper-grid">
            <div class="cube"><div class="face face-front">C</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">H</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">U</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">A</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">N</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">G</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">H</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">U</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
            <div class="cube"><div class="face face-front">A</div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
        </div>
        <div class="loading-text">CHUANGHUA</div>
        <div class="loading-bar"></div>
        <div class="btn-wrapper">
            <a href="index.html" class="enter-btn">进入创华</a>
        </div>
    </div>
</body>
</html>
